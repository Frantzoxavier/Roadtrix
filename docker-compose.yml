version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: roadtrix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: roadtrix
      POSTGRES_PASSWORD: roadtrix_dev
      POSTGRES_DB: roadtrix
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U roadtrix']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roadtrix-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://roadtrix:roadtrix_dev@postgres:5432/roadtrix
      JWT_SECRET: super-secret-change-in-production
      PORT: 4000
      NODE_ENV: development
      UPLOAD_DIR: ./uploads
    ports:
      - '4000:4000'
    volumes:
      - ./backend/uploads:/app/uploads

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: roadtrix-admin
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
